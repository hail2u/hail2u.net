    <h1 class="headline">CoolMonとRSS</h1>
  </header>

  <div itemprop="articleBody"><p>RSSのヘッドラインを表示するのには<a href="http://coolmon.arsware.org/" title="CoolMon - system stats on your desktop">CoolMon</a>使うのが良いかもしれない。そのためだけに常駐させるのは馬鹿化てますが。</p>
<p>てなわけで、CoolMonで扱えるように、RSSファイルからヘッドラインをべたテキストで出力するものを作ってみました。1分もかからず作ったものですが。</p>
<figure><a href="/img/blog/cm_rss.png"><img alt="RSS on the CoolMon" height="232" src="/img/blog/cm_rss.png" width="320"></a></figure>
<p>こんな感じで表示されてます(わかりにくいし、そのまんま)。</p></div>
