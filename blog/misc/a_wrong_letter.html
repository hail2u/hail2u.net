	</header>

	<div itemprop="articleBody"><p>誤字なんてするのは気合いと集中力が足らないからですよ。とか、言ってみる。</p>
<p>僕は、PCやなんかで入力している場合は比較的誤字（というか誤変換を見逃すこと）が多いのだけど、手で書いてるときは誤字が少ないですね。</p>
<blockquote>
<p>そりゃ難しい言い回しとか漢字を使わないからだろ。</p>
</blockquote>
<p>とか、言われました。まったくもってその通り。</p></div>
