        <h1><em>バドミントン</em></h1>
      </header>

    <main>

    <p>バドミントンをやった。10何年ぶりにやったような気がする。難しい。打つのはまだしも身長の低い相手へ打ちやすいように返すのが至難な気がする。というか何をどう考えたらああいうコントロールしづらいシャトルみたいなの思いついて、それで遊ぼうなんて考えたんだろう。狭い場所で遊ぶための工夫なのかな。</p>

<p>卓球とかもそうだけど見た目の割りにしんどい……。あと転んで数年ぶりに擦り傷みたいなの作った。ほ、ほら雨があがったすぐ後だったから……年とか運動不足じゃないよ。</p>
