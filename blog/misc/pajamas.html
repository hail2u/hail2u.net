			<h1 class="tagline">ねまき</h1>
		</header>

		<main id="content" class="content" itemprop="articleBody">

<p>半袖や短パンのねまきがこの世に存在することが信じられない。誰が買うんだろう的な。長袖・長ズボンじゃないと肩が凝るというか起きた時に筋肉がこわばる。眠りも浅くなりやすい。という医学的根拠に基づかない偏見を持っている。</p>

<p>夏向けの長袖のねまきがあんまり売ってなくて、たまに売ってても麻だったりしてけっこうな値段でビビる……。しまむらでも行くか。</p>
