<p>禁煙して一年。特に健康になったとも感じない。禁煙して肌に感じた効果は財布に優しいことくらい。</p>

<p>次は禁酒か。</p>

<p>そしてベジタリアンに。禁煙とか禁酒するとその勢いで健康マニアになりやすい気が。健康が気になるお年頃とかそういう。</p>
