	<div itemprop="articleBody">

<ul>
<li>8時過ぎにちょっと眠り込む</li>
<li>起きる</li>

<li>自販機の電気消えてる</li>
<li>23時過ぎてるよ</li>
</ul>
<p>人生ってくだらない。</p>
