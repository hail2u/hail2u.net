t=3264 src=/images/blog/tkg-tarako-20141217.jpg width=2448></a></figure><p>ピンク色とは生の<a href=http://ja.wikipedia.org/wiki/%E3%81%9F%E3%82%89%E3%81%93>たらこ</a>。ご飯にかける時は辛子明太子よりも普通のやつが好き。丸のままでなくても良いので、おいしいけど切り落としになってて、量の割には安価なものを買ってる。余ったらスパゲッティーの具にしよう！<a href=http://www.adventar.org/calendars/342>TKG Advent Calendar 2014</a>も17日目か。<p><a href=http://ja.wikipedia.org/wiki/%E3%82%A4%E3%82%AF%E3%83%A9>赤</a>と迷った結果、ピンクにした。<a href=http://ja.wikipedia.org/wiki/%E3%82%AD%E3%83%A3%E3%83%93%E3%82%A2>黒</a>でやってみようかとも考えていたけど、ジョークでやるには高額の出費になるのでやめた。</article></main><aside class=subcontent><form action=https://duckduckgo.com/ class=site-search role=search><input type=hidden name=sites value=hail2u.net> <input type=search class=query name=q placeholder="例: Blosxom" size=32> <input type=submit class=button value=Search></form></aside><footer class=global-footer><p class=byline><a href=https://kyonagashima.com/ rel=author>KN</a><p class=footlinks><a href=https://creativecommons.org/licenses/by-nc/4.0/ rel=license>CC BY-NC</a> • <a href=/feed rel=alternate>RSS</a></footer>
