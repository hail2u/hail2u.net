<p>マイナンバーが575になり、簡単に暗謡できるようになる。うっかり口ずさんでしまうと、俳人に依頼して新しい575を詠んでもらう。という冗談がうっかり採用され、なにかの賞の候補に……というところで頑張って起きた。</p>

<p>涼しくなってぐっすり眠れるようになったからか、またあまり夢を見なくなってきた。</p>
