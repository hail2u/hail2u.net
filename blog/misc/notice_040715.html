<p>サーバーの設定がおかしかったのか、しばらくの間、ページがうまく開けない状態だったみたいですね。16時くらいに直せた気が。</p>
<p>IRCで、「ページ開けないっぽい？」と教えてくれたJesurenさん、ありがとうございました。</p>
<p>てか、また雷すごいな！ゴロゴロというかドゴンドゴンって感じ。落ちるたびに家が揺れる。</p>
