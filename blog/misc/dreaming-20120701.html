<h1 class=headline>夢を見るようになった</h1>
<footer class=dateline>

<div itemprop=articleBody><p>夢を見るようになったというか、見た夢を覚えているようになった。これも老化か。</p>
<p>今日見た夢はありとあらゆる道が全部逆向きの動く歩道になっていてなかなか進めないというもの。一緒に歩いている人と「嫌な世の中になりましたねー」などと会話しながら100m先のコンビニに1時間かけて歩いた。現代人の運動不足を解消する政府の施策らしい。</p>
<p>夢診断とかはいいです。</div>
