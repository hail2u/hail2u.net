    <h1 class="headline">スライドの台紙</h1>
  </header>

  <div itemprop="articleBody"><figure>
<a href="/img/blog/slide-sleeves.jpg"><img alt="Ektachromeやフジカラーといったフィルムごとにスライド用の台紙も様々ある" height="2448" src="/img/blog/slide-sleeves.jpg" width="3264"></a>
</figure>

<p>スライドの台紙にも色々あった。Kodak(EktachromeはKodakらしい）や富士フイルム、コニカのものが多く、大塚カラーなども少しあった。それぞれにベースの色やタイプフェイス、文字色が凝っていて、個性的だ。</p>

<hr>

<p>スライドの分離作業は計10時間以上かかった。それでもなんとか終わったので、ようやくゴミとして出せる。燃やせるゴミの曜日に間に合ってよかった。</p></div>
