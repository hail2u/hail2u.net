<figure class="hero">
<a href="/img/blog/no-bath.jpg"><img alt="風呂が完全に解体され、風呂桶の代わりに脚立とスコップが「これらで体を洗ってください」と言わんばかりに置かれている" height="3264" src="/img/blog/no-bath.jpg" width="2448"></a>

<p>家に風呂がないと、台所の流しで頭を洗う羽目になり、いちじるしく人の尊厳を奪われる。お掃除機能付きのバスタブで天上人になる予定なので、しばらく未開人で我慢する……と思ったけど、川とかで全身洗ってるであろう未開人の方が人として格上な気がしてきた。</p>

<p>近所のスーパー銭湯が800円でなかなか厳しい。</p>
