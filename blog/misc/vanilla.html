					<h1>ヴァニラ</h1>
				</header>

				<p>ヴァニラ・コークってうまくもないんだけど、まずくもなく、微妙に癖になるけど、わざわざ探してまで飲もうとも思えない代物ですね。</p>
<p>ヴァニラ・アイスって障害物を飲み込みながら移動するんですよ。知ってました？</p>
<p>ヴァニラ・エッセンスって、そろそろ飽きてきました。</p>
<p>「とか」が多いな。とか、思った。</p>
