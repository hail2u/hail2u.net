    <p>miyagawaさんのアイディアで、BIGLOBEにまだ放置してあるblosxomにアクセスがあった場合、301でこっちに飛ばしてやるようにしました(もちろん対応する場所に)。飛ぶまでに若干ラグがありますが、何事もなかったようにこちらへ移動できるようになりました。</p>
