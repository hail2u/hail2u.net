	</header>

	<div itemprop="articleBody"><p>miyagawaさんのアイディアで、BIGLOBEにまだ放置してあるblosxomにアクセスがあった場合、301でこっちに飛ばしてやるようにしました（もちろん対応する場所に）。飛ぶまでに若干ラグがありますが、何事もなかったようにこちらへ移動できるようになりました。</p>
<p>そういや<a href="http://www.seoconsultants.com/w3c/status-codes.asp" title="HTTP Status Codes - Redirecting URLs in IIS and Apache">301で飛ばすとGoogleのPageRankを引き継ぐ</a>らしいです。</p></div>
