<p>CGIのみで動作させられるテキストカウンタ見つけたので、つけてみる。JavaScriptが使えない状態だったりするとカウントアップしないけど、そこらへんはどうでもいいかなと。二・三日動かしてみて、大丈夫そうだったら古いのは外そうっと。</p>
<p>テキストカウンタきれいだ。</p>
