	<div itemprop="articleBody">
		<p>BBSの返信を書くURIにアクセスする時、JavaScriptでリダイレクトするのではなく、たんなるリンクで飛ぶようにしてみる。書き込み結果を表示するURIからBBSに戻る時に、openerがあるかどうか調べてから処理しているので、別ウィンドウを開いて書き込んでも、不必要になる別ウィンドウを閉じて、再読み込みしてくれる・・・と思う。</p>
<p>変なトップページだ。</p>
