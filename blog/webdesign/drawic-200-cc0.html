<figure><a href="https://hail2u.github.io/drawic/"><img alt="CC0" height="627" src="/img/blog/drawic-200-cc0.png" width="1200"></a></figure>

<p><a href="https://hail2u.github.io/drawic/">Drawic</a>にライセンスを付けようとしていたのをやめて、<a href="http://creativecommons.org/about/cc0">CC0</a>で放流することにした。CC-BYをSVGに埋め込もうかなと思ってたんだけど、ファイルサイズが大きくなっちゃうのがもったいないのでやめた。</p>

<p>CC0は万国共通で通用するということになっているみたいだけど、日本だと実際はどうなるんだろう。と、pushしてから思ったりした。</p>
