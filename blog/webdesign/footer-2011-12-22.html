  <h1 class="headline">フッターをちょっと変えた</h1>

  <footer>
    <p class="dateline"><time datetime="2011-12-22T02:34:49+09:00" itemprop="datePublished">2011年12月22日</time></p>
  </footer>

  <div itemprop="articleBody"><figure><a href="/img/blog/footer-2011-12-22.png"><img alt="枠線等を削除してシンプルにしたフッター" src="/img/blog/footer-2011-12-22.png"></a></figure>

<p>矢印をシンプルにした所、どうも枠線や色がとかが強すぎる感じがしてきたので、装飾をばっさりと剥ぎとってみました。合わせてフッターのアイコン群も黒のものから白のものに。枠付きのDeliciousのアイコンを新たに追加したりとかも。</p>

<p>こういう細かい所をいじるのは良い現実逃避になって良いですね！</p></div>
