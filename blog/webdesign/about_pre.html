<article>
  <h1 class="headline">pre要素について</h1>

  <footer>
    <p class="dateline"><time datetime="2003-07-27T22:25:44+09:00" itemprop="datePublished">2003年7月27日</time></p>
  </footer>

  <div itemprop="articleBody"><p>このサイトではベタテキストを書く場合、<code>pre</code>使う代わりに<code>code</code>で誤魔化しています。良くないことです。</p>
<p>理由は「<code>pre</code>は自動的に折り返してくれない」ということにあります。挙動としてはそれで良いと思うのですがね。デザイン考える時に崩れやすいので。本来ならここでCSSの<code>overflow</code>プロパティを利用すべきなんでしょうけど、好きじゃない。</p></div>
