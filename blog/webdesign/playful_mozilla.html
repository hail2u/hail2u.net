	</header>

	<div itemprop="articleBody">
		<p>Mozillaでのレンダリングがどうも変です。BBSとか見てみるとわかるんですが、枠としてつけてあるborderがところどころ消えてたりする。特に問題のあるところも見つからないので、とりあえず放置。再現性はあるのに、パターンがわからないので、どうしようもないんですが。</p>
