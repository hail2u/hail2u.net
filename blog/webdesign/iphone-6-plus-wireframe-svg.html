    <h1>iPhone 6 Plusのワイヤーフレーム（SVG）</h1>

    <div itemprop="articleBody"><figure>
<a href="/pub/iphone-6-plus.svg"><img alt="iPhone 6 Plus" src="/img/blog/iphone-6-plus-wireframe-svg.svg"></a>
</figure>

<p>アバウトにトレースして、SVGを作っておいた。トレースしてて「あれ？センサーでかくなった？」とか思って気付いたんだけど、前面上部のセンサーとカメラの位置が入れ替わったのかな？<a href="http://www.apple.com/jp/iphone-6/cameras/">拡大した画像</a>を見ると、スピーカー横がカメラになっているように見える。</p></div>
