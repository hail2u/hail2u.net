<article>
	<header>
		<p class="metaline"><time datetime="2019-12-08T13:11:04+09:00" itemprop="datePublished">2019年12月8日</time></p>

		<h1 class="headline">ゆず（2019)</h1>
	</header>

	<div itemprop="articleBody">
		<figure><a href="/img/blog/yuzu-2019.jpg"><img alt="段ボール箱にいっぱいのゆず" height="2268" src="/img/blog/yuzu-2019.jpg" width="4032"></a></figure>

<p>今年のゆずを収穫した。200個前後で、よくとれた。小ぶりのものが多いようにも感じたが、数があるせいかもしれない。数年前にまったくとれなかったのは、やはりたまたまだったようだ。リモンチェッロ的なのを作ってやろうかな、と考えている。</p>

<p>わっさわっさになってきたので、少し枝を落としたりもした。カイガラムシがついていたところを中心に落とし、すっきりした。来年もとれるといいな。</p>
