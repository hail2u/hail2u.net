<article>
<h1 class=headline>六本木散歩</h1>
<footer>
<p class=dateline><time datetime=2017-10-12T13:13:51+09:00 itemprop=datePublished>2017年10月12日</time></p>
</footer>
<div itemprop=articleBody><p>東京ミッドタウンの21_21 Design Sightとデザインハブに行くついでに、付近を散歩した。たまにはという感じで写真のみでやってみたりする。雨が降ってもおかしくない陽気だったため、とにかく暗い。</p>

<a href=/img/blog/roppongi-20171011-nogizaka-station.jpg><img alt=地下鉄出口から東京ミッドタウン側を望む20年変わらぬ風景 src=/img/blog/roppongi-20171011-nogizaka-station.jpg></a>
</figure>
<figure>
<a href=/img/blog/roppongi-20171011-tokyo-midwtown.jpg><img alt="21_21 Design Sightの裏に出る西の端の道"src=/img/blog/roppongi-20171011-tokyo-midwtown.jpg></a>
</figure>
<figure>
<a href=/img/blog/roppongi-20171011-bijutsukan-dori.jpg><img alt=ずっと進むと根津美術館まで歩ける src=/img/blog/roppongi-20171011-bijutsukan-dori.jpg></a>
</figure>
<figure>
<a href=/img/blog/roppongi-20171011-roppongi-tunnel.jpg><img alt=ドラマの撮影で使われていたのも今は昔 src=/img/blog/roppongi-20171011-roppongi-tunnel.jpg></a>
</figure>
<figure>
<a href=/img/blog/roppongi-20171011-roppongi-hills.jpg><img alt=森タワーの脇を抜けたあたりの通廊 src=/img/blog/roppongi-20171011-roppongi-hills.jpg></a>
</figure>
<figure>
<a href=/img/blog/roppongi-20171011-toriizaka.jpg><img alt=すり鉢状になった麻布十番から六本木や麻布台の方へ上る src=/img/blog/roppongi-20171011-toriizaka.jpg></a>
</figure>
<figure>
<a href=/img/blog/roppongi-20171011-gaienhigashi-street.jpg><img alt=首都高を越え東京タワーを望む辺りにオープンカフェ付きで営業している src=/img/blog/roppongi-20171011-gaienhigashi-street.jpg></a>
</figure>
<figure>
<a href=/img/blog/roppongi-20171011-gaienmae.jpg><img alt=高い椅子と高い服と高い雑貨が置いてある店が見える src=/img/blog/roppongi-20171011-gaienmae.jpg></a>
</figure>
<p>国立競技場前まで歩き、新宿に出て帰宅した。国立競技場の建設はまだまだ土台かなと想像していたが、スタンドらしいもの骨組みが出来上がっていた。</div>
