  <div itemprop="articleBody"><p>映画史上、最高傑作とも噂されるMatrixの続編の予告編が出てました。<a href="http://whatisthematrix.warnerbros.com/rl_cmp/reloaded_trailer2_320.html" title="320*144">320*144</a>と、<a href="http://whatisthematrix.warnerbros.com/rl_cmp/reloaded_trailer2_480.html" title="480*224">480*224</a>、<a href="http://whatisthematrix.warnerbros.com/rl_cmp/reloaded_trailer2_640.html" title="640*288">640*288</a>のQuickTimeストリーミング。やはりこういうのにはQuickTimeの方が圧倒的に強いな。Realなんて話になってない。</p>
<p>ていうか、<del>来年</del>今年にRELOADEDとREVOLUTIONSというサブタイトルで、2つも公開するのかよ！</p></div>
