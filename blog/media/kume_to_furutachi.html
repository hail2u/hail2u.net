		<h1>久米宏降板</h1>
	</header>

	<div itemprop="articleBody">
		<p>後任は古舘伊知郎。<a href="http://www.asahi.com/culture/update/0823/001.html" title="久米宏さん、ニュースステーションのキャスター降板へ">朝日新聞</a>によると来春で、<a href="http://www.nikkansports.com/ns/entertainment/p-et-tp0-030823-0005.html" title="久米宏氏が「ニュースステーション」降板
">日刊スポーツ</a>によると9月。どっちやねん。</p>
<p>古舘は芸が無いような・・・。どうせなら上戸彩にでも。つか、トーキングブルースはやめるのかな？　どうでもいいんだけど、なんとなく気になる。</p>
