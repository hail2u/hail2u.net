<p>Liz Phairの新しいアルバム、<a href="http://www.amazon.co.jp/exec/obidos/ASIN/B00009OOH9/hail2unet-22" title="Amazon.co.jp： 音楽: Liz Phair [FROM US] [IMPORT] [EXPLICIT LYRICS]">Liz Phair</a>良いです。微妙に下手な歌にさらに磨きがかかってます。最高。</p>
