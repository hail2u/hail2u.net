        <h1>炎路を行く者</h1>

        <figure class="hang">
<a href="http://www.amazon.co.jp/%E7%82%8E%E8%B7%AF%E3%82%92%E8%A1%8C%E3%81%8F%E8%80%85-%E2%80%94%E5%AE%88%E3%82%8A%E4%BA%BA%E4%BD%9C%E5%93%81%E9%9B%86%E2%80%94-%E5%81%95%E6%88%90%E7%A4%BE%E3%83%AF%E3%83%B3%E3%83%80%E3%83%BC%E3%83%A9%E3%83%B3%E3%83%89-%E4%B8%8A%E6%A9%8B-%E8%8F%9C%E7%A9%82%E5%AD%90/dp/4035403806%3FSubscriptionId%3D08PWFCAAQ5TZJT30SKG2%26tag%3Dhail2unet-22%26linkCode%3Dxm2%26camp%3D2025%26creative%3D165953%26creativeASIN%3D4035403806"><img alt="炎路を行く者 —守り人作品集— (偕成社ワンダーランド)" src="https://images-fe.ssl-images-amazon.com/images/I/61KmLIINMJL.jpg"></a>
</figure>

<p>守り人シリーズを読みなおしてから、読んでいなかった<a href="http://www.amazon.co.jp/%E7%82%8E%E8%B7%AF%E3%82%92%E8%A1%8C%E3%81%8F%E8%80%85-%E2%80%94%E5%AE%88%E3%82%8A%E4%BA%BA%E4%BD%9C%E5%93%81%E9%9B%86%E2%80%94-%E5%81%95%E6%88%90%E7%A4%BE%E3%83%AF%E3%83%B3%E3%83%80%E3%83%BC%E3%83%A9%E3%83%B3%E3%83%89-%E4%B8%8A%E6%A9%8B-%E8%8F%9C%E7%A9%82%E5%AD%90/dp/4035403806%3FSubscriptionId%3D08PWFCAAQ5TZJT30SKG2%26tag%3Dhail2unet-22%26linkCode%3Dxm2%26camp%3D2025%26creative%3D165953%26creativeASIN%3D4035403806">炎路を行く者</a>を読んだ。本編で強烈な印象を残しながらも人物像がぼんやりしていたアラユタン・ヒュウゴを堪能できた。守り人シリーズは好きだったけど、なんかこう消化不良みたいなところり、そのひとつがヒュウゴの印象と語られ方のギャップだったので、そのあたりが補完できるこれを読み、より好きになれた。</p>
