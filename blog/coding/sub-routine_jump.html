  <div itemprop="articleBody"><p>秀丸のタグジャンプでPerlのサブルーチンをたどれるようにしようかと思ったけど、面白そうなのでマクロでサブルーチンの一覧メニューを出して、ジャンプできるマクロを作ってました。こんな感じ。</p>
<figure><a href="/img/blog/perlsrj.png"><img alt="PerlSubroutineJump.mac実行画面" height="240" src="/img/blog/perlsrj.png" width="320"></a></figure>
<p>おーかなり便利だ。と、完成してから、検索する文字を「^sub」にしてgrepすれば良いだけな話だということに気づいた罠。まーこれはこれで使い道ありそうだからまぁいいや。</p></div>
