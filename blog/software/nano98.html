	<div itemprop="articleBody">
		<p><a href="http://www.etek.chalmers.se/%7Ee8gus/nano98/" title="Nano98">Nano98</a>というサイトの指示に従ってWindows98をカスタマイズすると、Windowsフォルダが、なんと4.38MB(UPXを使用しない場合は7MB)に！ヒマすぎる・・・。世の中には面白いこと考える人がいるもので。</p>
<p>日本語版だとどれくらいになるかな。フォントを含めて、15MBくらいだろうか。誰か試してみませんか？僕はこのサイトを見ただけでお腹いっぱいです。</p>
