  <div itemprop="articleBody"><p>負けました。黒田かわいそうに。しかし、「工藤、隔年で大活躍」説はいまだ健在なのか。恐ろしいピッチャーだ。</p>
<p>沈黙の打線は・・・もう・・・嫌だ・・・。</p>
<p>上原の復調叩き台になりそうな予感。</p>
そろそろすっきりとした勝ちを
<p>すっきりと勝って欲しいものだ。今日はいけそうな予感はある。とくに理由はないですが。</p></div>
