		<h1 class="headline">カープ、2003年のドラフト</h1>
	</header>

	<div itemprop="articleBody">
		<p>例年の通り、非常にささやかなドラフトでしたね。内野手二人（比嘉と尾形）は即戦力とか評価してますが、それは言いすぎだろ。開幕一軍も怪しい。で、シーツは？ラロッカとかいらねーよ。ベイルはいるけど。</p>
<p>まー、シーツが残留してくれさえすれば、ストーブ・リーグはそれなりかなとか。あくまでもそれなりですが。</p>
	</div>
