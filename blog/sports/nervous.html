	<div itemprop="articleBody">
		<p>というか、もう開いた口がふさがらないというか。理解に苦しむ采配だ。抑えは永川でいくんじゃなかったのか？点差があるから小山田使ったのか？小山田が明らかに調整失敗してるのは前回の登板で明らかじゃないですか？どっしりと構えてるといえば聞こえはいいが、投げやりに適当にやってるようにしかみえん。</p>
<p>林と玉木がつぶれないことを祈って。</p>
