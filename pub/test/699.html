			const select = () => data[Math.floor(Math.random() * data.length)];

			const generate = (type, format, count) => {
				console.log(type, format, count);
				let result = [];

				for (var i = 0; i < count; i++) {
					if (type === "li") {
						result.push(select());
						continue;
					}

					const count = Math.floor(Math.random() * 5 + 3);
					const p = [];

					for (var j = 0; j < count; j++) {
						p.push(select());
					}

					result.push(p.join(""));
				}

				if (format === "html" && type === "li") {
					result = result.map((li) => `<li>${li}</li>`);
					result.unshift("<ul>");
					result.push("</ul>");
				}

				if (format === "html" && type === "p") {
					result = result.map((p) => `<p>${p}</p>`);
				}

				if (format === "txt") {
					result.unshift("<pre>");
					result.push("</pre>");
				}

				let delimiter = "\n";

				if (type === "p") {
					delimiter = "\n\n";
				}

				return result.join(delimiter);
			};

			document.getElementById("generate").addEventListener("click", () => {
				const type = document.querySelector('input[name="type"]:checked').value;
				const format = document.querySelector('input[name="format"]:checked').value;
				const count = document.getElementById("count").value;
				document.getElementById("result").innerHTML = generate(type, format, count);
			});
		</script>
