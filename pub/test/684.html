<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta content="width=device-width" name="viewport">

    <title>Test :visited and Custom Properties on Edge 17</title>

    <style>
      :root {
        --test: #008000;
      }

      a:visited {
        color: var(--test);
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Test :visited and Custom Properties on Edge 17</h1>

      <p>Edge 17が<code>a:visited</code>の<code>color</code>プロパティーの値でカスタム・プロパティーを使っている場合に警告を出す問題のテスト・ページです。</p>
    </header>
  </body>
</html>
